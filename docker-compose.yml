services:
  ordena24_api:
    restart: 'no'
    build:
      context: ./api
      dockerfile: Dockerfile
    image: apps/ordena24_api_dev:1
    ports:
      - '8000:8000'
    environment:
      - TZ=UTC
      - DB_HOST=ordena24_api_db
      - DB_PORT=5432
      - DB_NAME=ordena24_api_db
      - DB_USER=ordena24_user
      - DB_PASSWORD=ordena24_pass

      - WEBAPP_DB_HOST=ordena24_webapp_db
      - WEBAPP_DB_PORT=5432
      - WEBAPP_DB_NAME=ordena24_webapp_db
      - WEBAPP_DB_USER=ordena24_webapp_user
      - WEBAPP_DB_PASSWORD=ordena24_webapp_pass
    networks:
      - ordena24_net
    depends_on:
      - ordena24_api_db
      - ordena24_webapp_db
    volumes:
      - './uploads:/app/uploads'

  ordena24_webapp:
    restart: 'no'
    build:
      context: ./webapp
      dockerfile: Dockerfile
    image: apps/ordena24_webapp_dev:1
    ports:
      - '80:8000'
    environment:
      - TZ=UTC
      - WEBAPP_DB_HOST=ordena24_webapp_db
      - WEBAPP_DB_PORT=5432
      - WEBAPP_DB_NAME=ordena24_webapp_db
      - WEBAPP_DB_USER=ordena24_webapp_user
      - WEBAPP_DB_PASSWORD=ordena24_webapp_pass
      - API_URL=http://ordena24_api:8000
    networks:
      - ordena24_net
    depends_on:
      - ordena24_webapp_db
      - ordena24_api

  ordena24_api_db:
    image: 'bitnamilegacy/postgresql:14.9.0'
    ports:
      - '5433:5432'
    environment:
      - TZ=UTC
      - POSTGRESQL_DATABASE=ordena24_api_db
      - POSTGRESQL_USERNAME=ordena24_user
      - POSTGRESQL_PASSWORD=ordena24_pass
    networks:
      - ordena24_net
    volumes:
      - ordena24_api_db_data:/bitnami/postgresql
      - ./sql/api:/docker-entrypoint-initdb.d:ro

  ordena24_webapp_db:
    image: 'bitnamilegacy/postgresql:14.9.0'
    ports:
      - '5434:5432'
    environment:
      - TZ=UTC
      - POSTGRESQL_DATABASE=ordena24_webapp_db
      - POSTGRESQL_USERNAME=ordena24_webapp_user
      - POSTGRESQL_PASSWORD=ordena24_webapp_pass
    networks:
      - ordena24_net
    volumes:
      - ordena24_webapp_db_data:/bitnami/postgresql
      - ./sql/webapp:/docker-entrypoint-initdb.d:ro

networks:
  ordena24_net:
    driver: bridge

volumes:
  ordena24_api_db_data:
    driver: local

  ordena24_webapp_db_data:
    driver: local